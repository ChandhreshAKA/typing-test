<!DOCTYPE html>
<html lang="en" data-theme="serika-dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>monkeytype</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:ital,wght@0,400;0,500;0,700;1,400&family=Lexend+Deca:wght@400;500;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<header id="header">
  <div class="header-left">
    <div class="logo">
     <!-- <span class="logo-icon">&#128018;</span>-->
      <span class="logo-text">typing test</span>
    </div>
  </div>
  <nav class="header-nav">
    <button class="nav-icon-btn" id="navHome" title="Home">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg>
    </button>
    <button class="nav-icon-btn" id="navLeaderboard" title="Leaderboard">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="14" width="5" height="8" rx="1"/><rect x="9.5" y="9" width="5" height="13" rx="1"/><rect x="17" y="4" width="5" height="18" rx="1"/></svg>
    </button>
    <button class="nav-icon-btn" id="navAbout" title="About">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>
    </button>
  </nav>
  <div class="header-right">
    <button class="nav-icon-btn" id="themeBtn" title="Theme">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
    </button>
    <button class="nav-icon-btn" id="settingsBtn" title="Settings">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
    </button>
    <button class="login-btn" id="loginBtn">login</button>
  </div>
</header>

<main id="mainContent">

  <!-- TEST SECTION -->
  <div id="testSection">

    <div class="mode-bar" id="modeBar">
      <div class="mode-group">
        <div class="mode-tag" id="punctuationBtn" title="Punctuation">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="14" y2="12"/><line x1="4" y1="18" x2="18" y2="18"/></svg>
          punctuation
        </div>
        <div class="mode-tag" id="numbersBtn" title="Numbers">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><path d="M4 9h16M4 15h16M10 3L8 21M16 3l-2 18"/></svg>
          numbers
        </div>
      </div>
      <div class="mode-sep"></div>
      <div class="mode-group">
        <div class="mode-pill" data-mode="words">words</div>
        <div class="mode-pill active" data-mode="time">time</div>
        <div class="mode-pill" data-mode="quote">quote</div>
        <div class="mode-pill" data-mode="zen">zen</div>
        <div class="mode-pill" data-mode="custom">custom</div>
      </div>
      <div class="mode-sep"></div>
      <div class="mode-group" id="subModeGroup">
        <div class="mode-pill sub" data-val="15">15</div>
        <div class="mode-pill sub active" data-val="30">30</div>
        <div class="mode-pill sub" data-val="60">60</div>
        <div class="mode-pill sub" data-val="120">120</div>
      </div>
    </div>

    <!-- Live stats shown during test -->
    <div class="live-stats hidden" id="liveStats">
      <div id="liveTimer" class="live-timer">30</div>
    </div>

    <div class="words-container" id="wordsContainer">
      <div class="words" id="wordsDisplay"></div>
      <div class="out-of-focus" id="outOfFocus">
        click here or press any key to focus
      </div>
    </div>

    <input type="text" id="typingInput" class="typing-input"
      autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"/>

    <div class="bottom-bar" id="bottomBar">
      <div class="bottom-left">
        <button class="icon-btn restart-btn" id="restartBtn" title="Restart">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><path d="M3 12a9 9 0 109-9 9.75 9.75 0 00-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
        </button>
      </div>
      <div class="key-tips">
        <span><kbd>tab</kbd> - restart test</span>
        <span><kbd>esc</kbd> - command line</span>
      </div>
    </div>
  </div>

  <!-- RESULTS SECTION -->
  <div id="resultSection" class="hidden">
    <div class="results-wrap">

      <div class="res-top-row">
        <div class="res-wpm-block">
          <div class="res-label">wpm</div>
          <div class="res-big" id="resWpm">0</div>
        </div>
        <div class="res-acc-block">
          <div class="res-label">acc</div>
          <div class="res-big" id="resAcc">0%</div>
        </div>
        <div class="res-chart-wrap">
          <canvas id="resultChart"></canvas>
        </div>
      </div>

      <div class="res-sub-row">
        <div class="res-sub-item">
          <div class="res-sub-label">test type</div>
          <div class="res-sub-val" id="resTestType">-</div>
        </div>
        <div class="res-sub-item">
          <div class="res-sub-label">raw</div>
          <div class="res-sub-val" id="resRaw">-</div>
        </div>
        <div class="res-sub-item">
          <div class="res-sub-label">characters</div>
          <div class="res-sub-val" id="resChars">-</div>
        </div>
        <div class="res-sub-item">
          <div class="res-sub-label">consistency</div>
          <div class="res-sub-val" id="resConsistency">-</div>
        </div>
        <div class="res-sub-item">
          <div class="res-sub-label">time</div>
          <div class="res-sub-val" id="resTime">-</div>
        </div>
      </div>

      <div class="res-actions">
        <button class="icon-btn res-btn" id="resRetryBtn" title="Retry">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><path d="M3 12a9 9 0 109-9 9.75 9.75 0 00-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
        </button>
        <button class="icon-btn res-btn" id="resNextBtn" title="Next test">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><polyline points="5 12 19 12"/><polyline points="13 6 19 12 13 18"/></svg>
        </button>
      </div>
    </div>
  </div>

</main>

<footer id="footer">
  <div class="footer-links">
    <a href="#" class="footer-link">github</a>
    <a href="#" class="footer-link">discord</a>
    <a href="#" class="footer-link">support us</a>
    <a href="#" class="footer-link">terms</a>
    <a href="#" class="footer-link">privacy</a>
  </div>
  <div class="footer-right">v1.0.0</div>
</footer>

<!-- Command line -->
<div class="overlay hidden" id="cmdOverlay">
  <div class="cmd-box">
    <div class="cmd-icon">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
    </div>
    <input type="text" id="cmdInput" class="cmd-input" placeholder="type a command..." autocomplete="off" spellcheck="false"/>
  </div>
  <div class="cmd-results" id="cmdResults"></div>
</div>

<!-- Theme picker -->
<div class="overlay hidden" id="themeOverlay">
  <div class="theme-box">
    <input type="text" id="themeSearch" class="cmd-input" placeholder="search themes..." autocomplete="off" spellcheck="false"/>
    <div class="theme-list" id="themeList"></div>
  </div>
</div>

<!-- Caps lock warning -->
<div class="caps-warning hidden" id="capsWarning">caps lock</div>

<script src="script.js"></script>
</body>
</html>
